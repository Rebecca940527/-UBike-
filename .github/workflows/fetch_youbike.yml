name: 抓取鶯歌區YouBike即時資料

on:
  schedule:
    # 每15分鐘觸發一次 (cron是UTC時間，跟台北時區無關，腳本內部自己處理時區)
    # 注意: GitHub Actions的schedule在免費方案上可能有幾分鐘的延遲，屬正常現象
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # 允許在GitHub網頁上手動點擊執行，方便測試

permissions:
  contents: write   # 需要寫入權限才能commit資料回repo

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5   # 避免單次執行卡住占用runner太久

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas

      - name: 執行抓取
        id: fetch
        continue-on-error: true   # 就算這次抓取失敗，也不要讓整個workflow整批標記中斷
        run: python scripts/fetch_and_save.py

      - name: Commit並push新資料
        run: |
          git config user.name "youbike-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/raw/
          # 如果沒有新變動就跳過commit，避免產生空commit
          git diff --staged --quiet || git commit -m "auto: 鶯歌區YouBike資料 $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
